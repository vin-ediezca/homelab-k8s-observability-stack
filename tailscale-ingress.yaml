# tailscale-ingress.yaml
# Tailscale Ingress resources — HTTPS via Tailscale certificates
#
# Prerequisites:
#   Tailscale admin → DNS → Enable HTTPS Certificates  (must do this first)
#
# Applied once with: kubectl apply -f tailscale-ingress.yaml
# Not managed by Helm — survives chart upgrades.

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    tailscale.com/hostname: "grafana-homelab"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: kube-prometheus-stack-grafana
      port:
        number: 80
  tls:
    - hosts:
        - grafana-homelab
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus-ingress
  namespace: monitoring
  annotations:
    tailscale.com/hostname: "prometheus-homelab"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: kube-prometheus-stack-prometheus
      port:
        number: 9090
  tls:
    - hosts:
        - prometheus-homelab
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loki-ingress
  namespace: monitoring
  annotations:
    tailscale.com/hostname: "loki-homelab"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: loki-gateway
      port:
        number: 80
  tls:
    - hosts:
        - loki-homelab
---
# Tempo routes to port 4318 (OTLP HTTP) instead of 4317 (gRPC)
# because Ingress handles HTTP/HTTPS traffic natively.
# External Alloy agents use otelcol.exporter.otlphttp instead of
# otelcol.exporter.otlp — Alloy auto-appends /v1/traces to the base URL.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tempo-ingress
  namespace: monitoring
  annotations:
    tailscale.com/hostname: "tempo-homelab"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: tempo
      port:
        number: 4318
  tls:
    - hosts:
        - tempo-homelab
