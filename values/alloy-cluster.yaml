# Grafana Alloy values — In-Cluster (k8s log & event collection)
# Runs as a DaemonSet; collects pod logs and Kubernetes events → Loki

alloy:
  configMap:
    create: true
    content: |-
      // ============================================================
      // Kubernetes Pod Log Discovery
      // ============================================================
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        // Drop pods that have opted out of log collection
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_loki_collect"]
          regex         = "false"
          action        = "drop"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]
          separator     = "/"
          target_label  = "job"
        }
      }

      // ============================================================
      // Kubernetes Pod Log Collection (via k8s API — no hostPath mount)
      // ============================================================
      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.add_cluster_label.receiver]
      }

      // ============================================================
      // Kubernetes Events → Loki
      // ============================================================
      loki.source.kubernetes_events "events" {
        job_name   = "integrations/kubernetes/eventhandler"
        log_format = "logfmt"
        forward_to = [loki.process.add_cluster_label.receiver]
      }

      // ============================================================
      // Add cluster label to all log streams
      // ============================================================
      loki.process "add_cluster_label" {
        forward_to = [loki.write.loki.receiver]

        stage.static_labels {
          values = {
            cluster = "homelab",
          }
        }
      }

      // ============================================================
      // Loki Write (in-cluster, ClusterIP)
      // ============================================================
      loki.write "loki" {
        endpoint {
          url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
        }
      }

  # Enable public-preview components (loki.source.kubernetes_events)
  extraArgs:
    - --stability.level=public-preview

  storagePath: /var/lib/alloy

# ─────────────────────────────────────────────────────────────
# CONTROLLER
# ─────────────────────────────────────────────────────────────
# DaemonSet ensures one Alloy pod runs on every node
controller:
  type: daemonset

# ─────────────────────────────────────────────────────────────
# RBAC  (needed for discovery.kubernetes and loki.source.kubernetes)
# ─────────────────────────────────────────────────────────────
rbac:
  create: true

serviceAccount:
  create: true
  name: alloy
