# Loki values — Homelab (SingleBinary, Tailscale)

deploymentMode: SingleBinary

# ─────────────────────────────────────────────────────────────
# LOKI CONFIGURATION
# ─────────────────────────────────────────────────────────────
loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  limits_config:
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    max_query_length: 720h
    retention_period: 720h
    allow_structured_metadata: true

  compactor:
    retention_enabled: true
    delete_request_store: filesystem

# ─────────────────────────────────────────────────────────────
# SINGLE BINARY
# ─────────────────────────────────────────────────────────────
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 30Gi

# ─────────────────────────────────────────────────────────────
# GATEWAY
# ─────────────────────────────────────────────────────────────
gateway:
  enabled: true
  # ClusterIP — HTTPS access is handled by loki-ingress
  # in tailscale-ingress.yaml
  service:
    type: ClusterIP

# ─────────────────────────────────────────────────────────────
# DISABLE DISTRIBUTED COMPONENTS + EXTRAS
# ─────────────────────────────────────────────────────────────
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

chunksCache:
  enabled: false
resultsCache:
  enabled: false

minio:
  enabled: false

lokiCanary:
  enabled: false
test:
  enabled: false